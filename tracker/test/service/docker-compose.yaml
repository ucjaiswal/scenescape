# Test environment for tracker service
# Supports both TLS and non-TLS modes via environment variables:
#   - TRACKER_MQTT_INSECURE=true (default): non-TLS on port 1883
#   - TRACKER_MQTT_INSECURE=false: TLS on port 8883, requires cert secrets

services:
  broker:
    image: eclipse-mosquitto:2.0.22
    ports:
      - "1883" # Dynamic host port for non-TLS
      - "8883" # Dynamic host port for TLS
    secrets:
      - source: ca_cert
        target: /mosquitto/certs/ca.crt
      - source: server_cert
        target: /mosquitto/certs/server.crt
      - source: server_key
        target: /mosquitto/certs/server.key
        mode: 0400
    configs:
      - source: mosquitto-config
        target: /mosquitto/config/mosquitto.conf
    restart: no

  mock-manager:
    profiles: ["api"]
    image: python:3.14-slim
    command: ["python", "/app/mock_manager.py"]
    configs:
      - source: mock-manager-script
        target: /app/mock_manager.py
      - source: mock-scenes
        target: /data/scenes.json
    restart: no
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')",
        ]
      interval: 1s
      timeout: 2s
      retries: 5
      start_period: 2s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.149.0
    configs:
      - source: otel-config
        target: /etc/otelcol-contrib/config.yaml
    restart: no

  tracker:
    image: scenescape-tracker:${VERSION:-latest}
    environment:
      - TRACKER_LOG_LEVEL=${TRACKER_LOG_LEVEL:-debug}
      - TRACKER_HEALTHCHECK_PORT=${TRACKER_HEALTHCHECK_PORT:-8080}
      - TRACKER_MQTT_HOST=broker
      - TRACKER_MQTT_PORT=${TRACKER_MQTT_PORT:-1883}
      - TRACKER_MQTT_INSECURE=${TRACKER_MQTT_INSECURE:-true}
      - TRACKER_MQTT_TLS_CA_CERT=${TRACKER_MQTT_TLS_CA_CERT:-}
      - TRACKER_MQTT_TLS_CLIENT_CERT=${TRACKER_MQTT_TLS_CLIENT_CERT:-}
      - TRACKER_MQTT_TLS_CLIENT_KEY=${TRACKER_MQTT_TLS_CLIENT_KEY:-}
      - TRACKER_SCENES_SOURCE=${TRACKER_SCENES_SOURCE:-api}
      - TRACKER_SCENES_FILE_PATH=${TRACKER_SCENES_FILE_PATH:-scenes.json}
      - TRACKER_MANAGER_URL=${TRACKER_MANAGER_URL:-}
      - TRACKER_MANAGER_AUTH_PATH=${TRACKER_MANAGER_AUTH_PATH:-}
      - TRACKER_METRICS_ENABLED=${TRACKER_METRICS_ENABLED:-false}
      - TRACKER_TRACING_ENABLED=${TRACKER_TRACING_ENABLED:-false}
      - TRACKER_OTLP_ENDPOINT=${TRACKER_OTLP_ENDPOINT:-otel-collector:4317}
      - TRACKER_METRICS_EXPORT_INTERVAL_S=${TRACKER_METRICS_EXPORT_INTERVAL_S:-60}
      - TRACKER_TRACING_EXPORT_INTERVAL_S=${TRACKER_TRACING_EXPORT_INTERVAL_S:-5}
      # Override host proxy settings - Paho MQTT dont respect no_proxy var, so as a WA
      # tracker code detects empty vars and unsets them (see mqtt_client.cpp clearEmptyProxyVars)
      - http_proxy=
      - https_proxy=
      - HTTP_PROXY=
      - HTTPS_PROXY=
    secrets:
      - source: ca_cert
        target: /run/secrets/ca_cert
      - source: client_cert
        target: /run/secrets/client_cert
      - source: client_key
        target: /run/secrets/client_key
        mode: 0400
      - source: mock_auth
        target: /run/secrets/mock-auth
    configs:
      - source: tracker-config
        target: /scenescape/config/tracker.json
    depends_on:
      - broker
      - otel-collector
    healthcheck:
      test: ["CMD", "/scenescape/tracker", "healthcheck"]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 5s
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 5s
    restart: on-failure

secrets:
  ca_cert:
    file: ${TLS_CA_CERT_FILE:-/dev/null}
  server_cert:
    file: ${TLS_SERVER_CERT_FILE:-/dev/null}
  server_key:
    file: ${TLS_SERVER_KEY_FILE:-/dev/null}
  client_cert:
    file: ${TLS_CLIENT_CERT_FILE:-/dev/null}
  client_key:
    file: ${TLS_CLIENT_KEY_FILE:-/dev/null}
  mock_auth:
    file: ./fixtures/test-auth.json

configs:
  mosquitto-config:
    file: ./mosquitto.conf
  otel-config:
    file: ./otel-collector-config.yaml
  tracker-config:
    file: ../../config/tracker.json
  mock-manager-script:
    file: ./mocks/mock_manager.py
  mock-scenes:
    file: ./fixtures/test-scenes-api.json
