version: 2
updates:
  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: /
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "GitHub Actions"
    groups:
      github-actions-dependency:
        applies-to: version-updates
        patterns:
          - "*"
    reviewers:
      - "saratpoluri"
      - "dmytroye"
      - "tdorauintc"

  # Enable version updates for Helm charts
  - package-ecosystem: "helm"
    directory: "/kubernetes/scenescape-chart"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "Helm charts"
    reviewers:
      - "saratpoluri"
      - "dmytroye"
      - "tdorauintc"

  # Enable version updates for Docker
  - package-ecosystem: "docker"
    directories:
      - "/"
      - "/autocalibration"
      - "/broker"
      - "/controller"
      - "/kubernetes/init-images"
      - "/manager"
      - "/model_installer"
      - "/scene_common"
      - "/cluster_analytics"
      - "/controller/src/robot_vision"
      - "/mapping"
      - "/tracker"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "Dockerfile"
    ignore:
      - dependency-name: "python"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
    reviewers:
      - "saratpoluri"
      - "dmytroye"
      - "tdorauintc"

  # Enable version updates for Docker Compose
  - package-ecosystem: "docker-compose"
    directories:
      - "/sample_data"
      - "/tests/compose"
      - "/tests/compose/dlstreamer"
      - "/tests/perf_tests/compose"
      - "/tools/ppl_runner"
      - "/tracker/test/service"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "Docker Compose"
    reviewers:
      - "saratpoluri"
      - "dmytroye"
      - "tdorauintc"

  # Enable version updates for Python pip
  - package-ecosystem: "pip"
    directories:
      - "/.github/resources"
      - "/autocalibration"
      - "/autocalibration/src/reloc"
      - "/controller"
      - "/controller/src/robot_vision"
      - "/manager"
      - "/manager/test"
      - "/model_installer"
      - "/cluster_analytics"
      - "/mapping"
      - "/mapping/tests"
      - "/tracker/test/service"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "pip"
    ignore:
      - dependency-name: "numpy"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "Django"
        update-types:
          ["version-update:semver-major", "version-update:semver-minor"]
    reviewers:
      - "saratpoluri"
      - "dmytroye"
      - "tdorauintc"
