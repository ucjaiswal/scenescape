# OpenTelemetry Collector configuration for load testing.
# Receives OTLP gRPC from the tracker, exposes Prometheus metrics for assertions.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 100

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"

  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
